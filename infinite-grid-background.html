<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite Grid Background Demo</title>
    <style>
      :root {
        --bg: #141414;
        --fg: #ffffff;
        --muted: #8a8a8a;
        --grid: rgba(255, 255, 255, 0.32);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font-family: Inter, Arial, sans-serif;
        overflow: hidden;
      }
      .stage {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      .layer {
        position: absolute;
        inset: 0;
      }
      .base-grid {
        opacity: 0.06;
      }
      .active-grid {
        opacity: 0.4;
        -webkit-mask-image: radial-gradient(300px circle at 50% 50%, black, transparent);
        mask-image: radial-gradient(300px circle at 50% 50%, black, transparent);
      }
      .glow {
        position: absolute;
        border-radius: 999px;
        filter: blur(120px);
        pointer-events: none;
      }
      .g1 {
        right: -20%;
        top: -20%;
        width: 40%;
        height: 40%;
        background: rgba(249, 115, 22, 0.35);
      }
      .g2 {
        right: 10%;
        top: -10%;
        width: 20%;
        height: 20%;
        background: rgba(69, 109, 255, 0.35);
      }
      .g3 {
        left: -10%;
        bottom: -20%;
        width: 40%;
        height: 40%;
        background: rgba(59, 130, 246, 0.35);
      }
      .content {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 1rem;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(2rem, 6vw, 4rem);
      }
      p {
        margin: 0;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="stage" id="stage">
      <svg class="layer base-grid" viewBox="0 0 100 100" preserveAspectRatio="none">
        <defs>
          <pattern id="grid-base" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="var(--grid)" stroke-width="1"></path>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid-base)"></rect>
      </svg>

      <svg class="layer active-grid" id="active-grid" viewBox="0 0 100 100" preserveAspectRatio="none">
        <defs>
          <pattern id="grid-active" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="var(--grid)" stroke-width="1"></path>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid-active)"></rect>
      </svg>

      <div class="layer">
        <div class="glow g1"></div>
        <div class="glow g2"></div>
        <div class="glow g3"></div>
      </div>

      <div class="content">
        <div>
          <h1>The Infinite Grid</h1>
          <p>Move your cursor to reveal the active layer.</p>
        </div>
      </div>
    </div>

    <script>
      const stage = document.getElementById("stage");
      const activeGrid = document.getElementById("active-grid");
      const basePattern = document.querySelector("#grid-base");
      const activePattern = document.querySelector("#grid-active");
      const GRID = 40;
      let x = 0;
      let y = 0;

      function tick() {
        x = (x + 0.5) % GRID;
        y = (y + 0.5) % GRID;
        basePattern.setAttribute("x", String(x));
        basePattern.setAttribute("y", String(y));
        activePattern.setAttribute("x", String(x));
        activePattern.setAttribute("y", String(y));
        requestAnimationFrame(tick);
      }

      stage.addEventListener("mousemove", (event) => {
        const rect = stage.getBoundingClientRect();
        const mx = event.clientX - rect.left;
        const my = event.clientY - rect.top;
        const mask = `radial-gradient(300px circle at ${mx}px ${my}px, black, transparent)`;
        activeGrid.style.maskImage = mask;
        activeGrid.style.webkitMaskImage = mask;
      });

      requestAnimationFrame(tick);
    </script>
  </body>
</html>
